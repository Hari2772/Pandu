name: nearchat
description: NearChat - Viral Social Messaging Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network & API
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^5.0.2

  # Authentication
  google_sign_in: ^6.1.6
  firebase_auth: ^4.15.3
  firebase_core: ^2.24.2

  # Location Services
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.1.0

  # Real-time Communication
  flutter_webrtc: ^0.9.47
  webrtc_interface: ^1.1.1

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  video_player: ^2.8.1
  audio_session: ^0.1.18
  record: ^5.0.4
  audioplayers: ^5.2.1

  # Animations
  lottie: ^2.7.0
  flutter_animate: ^4.2.0+1

  # Navigation
  go_router: ^12.1.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # AdMob Integration
  google_mobile_ads: ^3.1.0

  # Push Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # Social Sharing
  share_plus: ^7.2.1
  url_launcher: ^6.2.2

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7

  # Analytics
  firebase_analytics: ^10.7.4
  mixpanel_flutter: ^2.1.0

  # Crash Reporting
  firebase_crashlytics: ^3.4.8

  # Performance
  flutter_performance: ^1.0.0

  # Device Info
  device_info_plus: ^9.1.1
  package_info_plus: ^4.2.0

  # File Handling
  file_picker: ^6.1.1
  path: ^1.8.3

  # JSON & Serialization
  json_annotation: ^4.8.1

  # HTTP & Networking
  http: ^1.1.2
  web_socket_channel: ^2.4.0

  # UI Enhancement
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  infinite_scroll_pagination: ^4.0.0

  # Charts & Analytics
  fl_chart: ^0.65.0

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  # Maps
  google_maps_flutter: ^2.5.3

  # Camera
  camera: ^0.10.5+5

  # Biometric Authentication
  local_auth_android: ^1.0.35
  local_auth_ios: ^1.1.5

  # Background Tasks
  workmanager: ^0.5.2

  # Deep Links
  uni_links: ^0.5.1

  # App Lifecycle
  flutter_lifecycle: ^1.0.0

  # Screen Recording Prevention
  flutter_windowmanager: ^0.2.0

  # Clipboard
  flutter_clipboard: ^0.0.3

  # Vibration
  vibration: ^1.8.4

  # Haptic Feedback
  haptic_feedback: ^0.1.0

  # App Store
  in_app_purchase: ^3.1.13

  # In-App Updates
  in_app_update: ^2.0.2

  # App Rating
  in_app_review: ^2.0.8

  # Device Orientation
  auto_orientation: ^2.3.1

  # Screen Brightness
  screen_brightness: ^0.2.2

  # Battery Info
  battery_plus: ^5.0.2

  # Network Info
  network_info_plus: ^4.1.0

  # Sensors
  sensors_plus: ^4.0.2

  # Bluetooth
  flutter_blue_plus: ^1.31.8

  # NFC
  nfc_manager: ^3.3.0

  # Barcode Scanner
  mobile_scanner: ^3.5.6

  # PDF
  pdf: ^3.10.7
  printing: ^5.11.1

  # Excel
  excel: ^2.1.0

  # CSV
  csv: ^5.1.1

  # ZIP
  archive: ^3.4.9

  # Image Processing
  image: ^4.1.3
  photo_view: ^0.14.0

  # Video Processing
  video_compress: ^3.1.2
  video_thumbnail: ^0.5.3

  # Audio Processing
  flutter_audio_capture: ^1.1.8
  flutter_sound: ^9.2.13

  # Speech Recognition
  speech_to_text: ^6.6.0

  # Text to Speech
  flutter_tts: ^3.8.5

  # OCR
  google_ml_kit: ^0.16.3

  # Face Detection
  google_mlkit_face_detection: ^0.9.0

  # Barcode Detection
  google_mlkit_barcode_scanning: ^0.10.0

  # Language Detection
  google_mlkit_language_id: ^0.6.0

  # Translation
  google_mlkit_translation: ^0.11.0

  # Smart Reply
  google_mlkit_smart_reply: ^0.11.0

  # Pose Detection
  google_mlkit_pose_detection: ^0.10.0

  # Object Detection
  google_mlkit_object_detection: ^0.11.0

  # Image Labeling
  google_mlkit_image_labeling: ^0.11.0

  # Text Recognition
  google_mlkit_text_recognition: ^0.11.0

  # Selfie Segmentation
  google_mlkit_selfie_segmentation: ^0.6.0

  # Digital Ink Recognition
  google_mlkit_digital_ink_recognition: ^0.6.0

  # Entity Extraction
  google_mlkit_entity_extraction: ^0.11.0

  # On-Device Translation
  google_mlkit_on_device_translation: ^0.11.0

  # Custom Model Interpreter
  google_mlkit_custom_models: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # Linting
  flutter_lints: ^3.0.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

  # Testing
  mockito: ^5.4.4
  test: ^1.24.9

  # Performance
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  # Platform-specific configurations
  android:
    compileSdkVersion: 34
    minSdkVersion: 21
    targetSdkVersion: 34

  ios:
    deploymentTarget: '12.0'

# Platform-specific dependencies
platforms:
  android:
    package: com.nearchat.app
    versionCode: 1
    versionName: "1.0.0"
  ios:
    bundleId: com.nearchat.app
    version: "1.0.0"
    buildNumber: "1"